
spring.security.user.name=cenk
spring.security.user.password=123456
# PostgreSQL Bağlantı Ayarları


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# === Uygulama ===
spring.application.name=N_ONE
server.port=8080

# === PostgreSQL Bağlantısı ===
# DB_HOST env değişkeni varsa onu kullan, yoksa localhost
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/n_one_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Not: dialect Spring Boot 4.x'te otomatik algılanıyor, elle yazılmasına gerek yok